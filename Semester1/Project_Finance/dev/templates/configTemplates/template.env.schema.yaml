# ------------------------------------------------------------------------------
# AUTO-GENERATED ENVIRONMENT SCHEMA
#
# Generator  : dev/generators/generate.env.js
# Template   : dev/templates/configTemplates/template.env.schema.yaml
#
# This file defines the allowed and expected environment configuration keys.
# ------------------------------------------------------------------------------

type: object

properties:
  NODE_ENV:
    type: string
    enum: [development, production, test]
    default: development
    description: Node environment mode.

  PORT:
    type: integer
    default: 3000
    description: Port number for the backend HTTP server.

  LOG_SCHEME:
    type: string
    enum: [swagger]
    default: swagger
    description: Logging scheme used by backend/logger.js.

  DATA_SOURCES:
    type: string
    example: "sql"
    description: Comma-separated list of active data sources (e.g. "sql").

  DB_DIALECT:
    type: string
    enum: [sqlite, postgres, mysql, mariadb, mssql]
    default: sqlite
    description: Primary SQL dialect used by the application at runtime.

  DB_DIALECT_LIST:
    type: string
    example: "sqlite,postgres"
    description: >
      Comma-separated list of SQL dialects that should be prepared/reset
      by dev/reset.db.js (e.g. "sqlite,postgres").

  DB_STORAGE:
    type: string
    example: "backend/data/sql/data.db"
    description: Path to the SQLite database file (used when DB_DIALECT=sqlite).

required:
  - NODE_ENV
  - PORT
  - LOG_SCHEME
  - DATA_SOURCES
  - DB_DIALECT
  - DB_DIALECT_LIST

# ------------------------------------------------------------------------------
# End of auto-generated environment schema
