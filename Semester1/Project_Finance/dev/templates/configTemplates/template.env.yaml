# Node / server
NODE_ENV: development
PORT: 3000

# Logging
# Currently supported: swagger
LOG_SCHEME: swagger

# Data sources
# Comma-separated list of active data sources (e.g. "sql")
DATA_SOURCES: sql

# SQL dialects
# DB_DIALECT:       primary dialect used at runtime
# DB_DIALECT_LIST:  dialects to prepare/reset in dev/reset.db.js
DB_DIALECT: sqlite
DB_DIALECT_LIST: sqlite,postgres

# SQLite configuration
# Only used when DB_DIALECT=sqlite
DB_STORAGE: "./backend/data/sql/data.db"

