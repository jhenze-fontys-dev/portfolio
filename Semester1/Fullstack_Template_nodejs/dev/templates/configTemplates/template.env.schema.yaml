# ------------------------------------------------------------------------------
# 🧩 CODEX Environment Schema Template (CODEX Reference)
# ------------------------------------------------------------------------------
# This schema defines the expected structure and data types of the
# `.env.yaml` configuration file used in CODEX-generated projects.
#
# CODEX uses this schema for:
#   - Validation before backend generation
#   - Auto-completion and documentation in IDEs
#   - Type-checking when converting YAML → .env
#
# 📂 Location: dev/templates/configTemplates/template.env.schema.yaml
# ------------------------------------------------------------------------------

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "CODEX Environment Configuration Schema"
description: >
  Schema defining the structure of .env.yaml files in CODEX-generated backends.
  Ensures consistent configuration for SQL, JSON, MQTT, and API data services.

type: object
required:
  - server
  - data_sources
  - sql

properties:
  server:
    type: object
    description: "Basic runtime server configuration."
    properties:
      port:
        type: integer
        description: "Port on which the backend server runs."
        default: 3000
      node_env:
        type: string
        enum: [development, production, test]
        default: development
      log_scheme:
        type: string
        description: "Logging configuration (e.g. swagger, json, console)."
        default: swagger
    required: [port]

  data_sources:
    type: object
    description: "Defines which data sources are active."
    properties:
      active:
        type: array
        description: "List of enabled data layers (e.g. sql, json, mqtt, api)."
        items:
          type: string
          enum: [sql, json, mqtt, api]
        default: [sql]
    required: [active]

  sql:
    type: object
    description: "Database connection settings for Sequelize ORM."
    properties:
      dialect:
        type: string
        enum: [sqlite, postgres, mysql, mariadb, mssql]
        default: sqlite
      storage:
        type: string
        description: "Path to SQLite file when dialect is sqlite."
        default: ./data/sqlite/app.sqlite
      host:
        type: string
        default: localhost
      port:
        type: integer
        default: 5432
      user:
        type: string
        default: app_user
      pass:
        type: string
        default: secret
      name:
        type: string
        default: app_database
      logging:
        type: boolean
        default: false

  json:
    type: object
    description: "Configuration for JSON-based data persistence."
    properties:
      storage_path:
        type: string
        description: "File path for JSON data storage."
        default: ./data/json/storage.json

  mqtt:
    type: object
    description: "MQTT client and broker configuration."
    properties:
      broker_url:
        type: string
        default: mqtt://localhost:1883
      username:
        type: string
      password:
        type: string
      client_id:
        type: string
        default: codex_mqtt_client

  api:
    type: object
    description: "External API data source configuration."
    properties:
      base_url:
        type: string
        default: https://api.example.com
      token:
        type: string
      timeout_ms:
        type: integer
        default: 5000

  codex:
    type: object
    description: "Metadata about CODEX generation."
    properties:
      generated:
        type: boolean
        default: true
      version:
        type: string
        default: 1.0.0

# ------------------------------------------------------------------------------
# 🧠 CODEX Template Notes
# ------------------------------------------------------------------------------
# 1️⃣ CODEX validates `.env.yaml` against this schema before project build.
# 2️⃣ Ensures that all sections exist and use correct data types.
# 3️⃣ Auto-fills missing fields with schema defaults.
# 4️⃣ The validated YAML can be flattened safely into `.env` format.
# 5️⃣ This schema evolves alongside CODEX to support new data sources.
# ------------------------------------------------------------------------------
