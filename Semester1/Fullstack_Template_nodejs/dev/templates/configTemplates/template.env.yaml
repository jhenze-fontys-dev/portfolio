# ------------------------------------------------------------------------------
# 🌍 CODEX Environment Configuration Template (CODEX Reference)
# ------------------------------------------------------------------------------
# Defines environment variables and configuration sections for
# CODEX-generated backend projects.
#
# Supports hybrid data layers (SQL, JSON, MQTT, API) and centralizes configuration.
# CODEX copies this file to the project root as `.env.yaml` or converts it to `.env`
# during backend generation.
#
# 📂 Location: dev/templates/configTemplates/template.env.yaml
# ------------------------------------------------------------------------------

server:
  port: 3000
  node_env: development        # development | production
  log_scheme: swagger

data_sources:
  # Comma-separated or YAML list of active data sources
  # Available: sql | json | mqtt | api
  active: [sql, json, api]

sql:
  dialect: sqlite              # sqlite | postgres | mysql | mariadb | mssql
  storage: ./data/sqlite/app.sqlite
  host: localhost
  port: 5432
  user: app_user
  pass: secret
  name: app_database
  logging: false

json:
  storage_path: ./data/json/storage.json

mqtt:
  broker_url: mqtt://localhost:1883
  username: ""
  password: ""
  client_id: codex_mqtt_client

api:
  base_url: https://api.example.com
  token: ""
  timeout_ms: 5000

codex:
  generated: true
  version: 1.0.0

# ------------------------------------------------------------------------------
# 🧠 CODEX Template Notes
# ------------------------------------------------------------------------------
# 1️⃣ CODEX copies this YAML to the generated project's root folder.
# 2️⃣ During generation, CODEX may flatten this YAML into a `.env` file if required.
# 3️⃣ Any missing sections will be auto-filled with safe defaults.
# 4️⃣ The data_sources.active list controls which data services are generated:
#       - sqlDataService.js
#       - jsonDataService.js
#       - mqttDataService.js
#       - apiDataService.js
# 5️⃣ Each generated service imports these variables via `dotenv` or a YAML loader.
# 6️⃣ YAML can later support nested configuration (e.g., per-environment overrides).
# ------------------------------------------------------------------------------

